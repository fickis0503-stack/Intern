//==== 컴파일된 앱 코드 시작 ====
const {
  useState,
  useEffect,
  useMemo,
  useCallback
} = React;

// ── Supabase 연결 설정 ─────────────────────────────────────────
const SUPABASE_URL = "https://ewgmtccwxonljitmsplh.supabase.co";
const SUPABASE_KEY = "sb_publishable_YJl0J6Hj4FjuTAmhm-tm1w_e7lelui-";
const TABLE = "internlog";
const K_SPACE = "log:space"; // 비밀 키(공간)는 이 기기에 기억

// window.storage 폴리필 (localStorage 기반) — 일반 브라우저/GitHub Pages 호환
if (typeof window !== "undefined" && !window.storage) {
  window.storage = {
    get: async k => {
      const v = localStorage.getItem(k);
      return v === null ? null : {
        value: v
      };
    },
    set: async (k, v) => {
      localStorage.setItem(k, v);
    },
    remove: async k => {
      localStorage.removeItem(k);
    }
  };
}

// Supabase REST 호출 헬퍼
const sbHeaders = () => ({
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json"
});

// 내 공간(row) 읽기: 없으면 null
async function sbLoad(space) {
  const url = `${SUPABASE_URL}/rest/v1/${TABLE}?space=eq.${encodeURIComponent(space)}&select=data`;
  const res = await fetch(url, {
    headers: sbHeaders()
  });
  if (!res.ok) throw new Error("load failed: " + res.status);
  const rows = await res.json();
  return rows.length ? rows[0].data : null;
}

// 내 공간(row) 저장: upsert
async function sbSave(space, data) {
  const url = `${SUPABASE_URL}/rest/v1/${TABLE}?on_conflict=space`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      ...sbHeaders(),
      "Prefer": "resolution=merge-duplicates,return=minimal"
    },
    body: JSON.stringify({
      space,
      data,
      updated_at: new Date().toISOString()
    })
  });
  if (!res.ok) throw new Error("save failed: " + res.status);
}

// ── Helpers ────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const WD = ["일", "월", "화", "수", "목", "금", "토"];

// 고정 카테고리 (프로젝트와 동등 레벨, 단일 칸)
const FIXED = [{
  id: "__news__",
  name: "뉴스스크랩"
}, {
  id: "__etc__",
  name: "기타 업무"
}, {
  id: "__study__",
  name: "개인 공부"
}];
// 개인 영역 (업무와 분리, 맨 하단)
const PERSONAL = [{
  id: "__personal__",
  name: "개인 노트"
}];
const ALL_CATS = [...FIXED, ...PERSONAL];
const isFixed = id => ALL_CATS.some(f => f.id === id);
const isFreeform = id => id === "__study__" || id === "__personal__";
const catName = (id, projects) => {
  const f = ALL_CATS.find(x => x.id === id);
  if (f) return f.name;
  const p = (projects || []).find(x => x.id === id);
  return p ? p.name : null;
};

// 폴더(중간 분류) 관련 상수/헬퍼
const NO_FOLDER = "__nofolder__"; // 미분류 폴더의 고정 id
const folderName = (catId, folderId, folders) => {
  if (!folderId || folderId === NO_FOLDER) return "미분류";
  const list = (folders || {})[catId] || [];
  const f = list.find(x => x.id === folderId);
  return f ? f.name : "미분류";
};

// ── App ────────────────────────────────────────────────────────
function InternLog() {
  const [loading, setLoading] = useState(true);
  const [space, setSpace] = useState(""); // 비밀 키(공간)
  const [needSpace, setNeedSpace] = useState(false); // 키 입력 화면 표시 여부
  const [errMsg, setErrMsg] = useState("");
  const [projects, setProjects] = useState([]);
  const [entries, setEntries] = useState([]);
  const [todos, setTodos] = useState([]);
  const [files, setFiles] = useState({}); // { [projectId]: [ {…} ] }
  const [folders, setFolders] = useState({}); // { [categoryId]: [ {id, name} ] }
  const [view, setView] = useState({
    name: "home"
  });
  const [toast, setToast] = useState("");
  const [syncing, setSyncing] = useState(false);
  const showToast = useCallback(m => {
    setToast(m);
    setTimeout(() => setToast(""), 1800);
  }, []);

  // ── 데이터 적용 헬퍼 ─────────────────────────────────────────
  const applyData = useCallback(data => {
    const projList = Array.isArray(data?.projects) ? data.projects : [];
    const entryList = Array.isArray(data?.entries) ? data.entries.slice() : [];
    const todoList = Array.isArray(data?.todos) ? data.todos : [];
    const fileMap = data?.files && typeof data.files === "object" ? data.files : {};
    const folderMap = data?.folders && typeof data.folders === "object" ? data.folders : {};
    entryList.sort((a, b) => a.date < b.date ? 1 : -1);
    setProjects(projList);
    setEntries(entryList);
    setTodos(todoList);
    setFiles(fileMap);
    setFolders(folderMap);
  }, []);

  // ── 공간 로드 ────────────────────────────────────────────────
  const loadSpace = useCallback(async key => {
    setLoading(true);
    setErrMsg("");
    try {
      const data = await sbLoad(key);
      applyData(data || {});
      setSpace(key);
      setNeedSpace(false);
      try {
        await window.storage.set(K_SPACE, key);
      } catch {}
    } catch (e) {
      console.error(e);
      setErrMsg("Supabase에 연결하지 못했어요.\n" + "· Supabase 프로젝트가 켜져 있는지(무료 플랜은 미사용 시 자동 일시정지)\n" + "· internlog 테이블과 정책(SQL)이 적용됐는지\n" + "확인 후 다시 시도해 주세요.\n\n(" + (e?.message || e) + ")");
      setNeedSpace(true);
    } finally {
      setLoading(false);
    }
  }, [applyData]);

  // ── 최초 진입: 저장된 공간 키가 있으면 자동 로드, 없으면 입력 화면 ──
  useEffect(() => {
    (async () => {
      let saved = "";
      try {
        const r = await window.storage.get(K_SPACE);
        if (r) saved = r.value;
      } catch {}
      if (saved) {
        await loadSpace(saved);
      } else {
        setNeedSpace(true);
        setLoading(false);
      }
    })();
  }, [loadSpace]);

  // ── 전체 저장 (현재 메모리 상태를 Supabase에 통째로 upsert) ──
  const persistAll = useCallback(async next => {
    if (!space) return;
    const payload = {
      version: 3,
      projects: next.projects ?? projects,
      entries: next.entries ?? entries,
      todos: next.todos ?? todos,
      files: next.files ?? files,
      folders: next.folders ?? folders
    };
    setSyncing(true);
    try {
      await sbSave(space, payload);
    } catch (e) {
      console.error(e);
      showToast("저장 실패 — 네트워크를 확인해 주세요");
    } finally {
      setSyncing(false);
    }
  }, [space, projects, entries, todos, files, folders, showToast]);

  // ── Persist (상태 갱신 + 서버 저장) ──────────────────────────
  const saveProjects = useCallback(async next => {
    setProjects(next);
    await persistAll({
      projects: next
    });
  }, [persistAll]);
  const saveEntry = useCallback(async entry => {
    const exists = entries.some(e => e.id === entry.id);
    const next = exists ? entries.map(e => e.id === entry.id ? entry : e) : [entry, ...entries];
    next.sort((a, b) => a.date < b.date ? 1 : -1);
    setEntries(next);
    await persistAll({
      entries: next
    });
  }, [entries, persistAll]);
  const deleteEntry = useCallback(async id => {
    const next = entries.filter(e => e.id !== id);
    setEntries(next);
    await persistAll({
      entries: next
    });
  }, [entries, persistAll]);
  const saveTodos = useCallback(async next => {
    setTodos(next);
    await persistAll({
      todos: next
    });
  }, [persistAll]);

  // 프로젝트별 첨부 저장 (App이 통합 관리)
  const saveFiles = useCallback(async (pid, list) => {
    const next = {
      ...files,
      [pid]: list
    };
    setFiles(next);
    await persistAll({
      files: next
    });
  }, [files, persistAll]);

  // ── 폴더(중간 분류) 관리 ──────────────────────────────────────
  // 폴더 추가
  const addFolder = useCallback(async (catId, name) => {
    const list = folders[catId] || [];
    const next = {
      ...folders,
      [catId]: [...list, {
        id: uid(),
        name
      }]
    };
    setFolders(next);
    await persistAll({
      folders: next
    });
  }, [folders, persistAll]);

  // 폴더 이름 변경
  const renameFolder = useCallback(async (catId, folderId, name) => {
    const list = folders[catId] || [];
    const next = {
      ...folders,
      [catId]: list.map(f => f.id === folderId ? {
        ...f,
        name
      } : f)
    };
    setFolders(next);
    await persistAll({
      folders: next
    });
  }, [folders, persistAll]);

  // ── Export ───────────────────────────────────────────────────
  const download = (content, type, ext) => {
    const blob = new Blob([content], {
      type
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `intern-log-${todayStr()}.${ext}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  };
  const exportJSON = useCallback(async () => {
    download(JSON.stringify({
      version: 4,
      exportedAt: new Date().toISOString(),
      projects,
      entries,
      todos,
      files,
      folders
    }, null, 2), "application/json", "json");
    showToast("백업 내보내기 완료");
  }, [projects, entries, todos, files, folders, showToast]);
  const importJSON = useCallback(async file => {
    if (!file) return;
    let data;
    try {
      const text = await file.text();
      data = JSON.parse(text);
    } catch {
      showToast("파일을 읽을 수 없어요 (.json 확인)");
      return;
    }
    if (!data || !Array.isArray(data.entries) || !Array.isArray(data.projects)) {
      showToast("백업 형식이 아니에요");
      return;
    }
    const ok = window.confirm("백업을 불러오면 지금 이 공간의 기록이 백업 내용으로 덮어쓰기 됩니다. 진행할까요?");
    if (!ok) return;
    try {
      const nextProjects = data.projects;
      const nextTodos = Array.isArray(data.todos) ? data.todos : [];
      const nextEntries = data.entries.slice().sort((a, b) => a.date < b.date ? 1 : -1);
      const nextFiles = data.files && typeof data.files === "object" ? data.files : {};
      const nextFolders = data.folders && typeof data.folders === "object" ? data.folders : {};
      setProjects(nextProjects);
      setTodos(nextTodos);
      setEntries(nextEntries);
      setFiles(nextFiles);
      setFolders(nextFolders);
      await persistAll({
        projects: nextProjects,
        todos: nextTodos,
        entries: nextEntries,
        files: nextFiles,
        folders: nextFolders
      });
      showToast("백업 불러오기 완료");
    } catch (e) {
      console.error(e);
      showToast("불러오기 중 오류가 났어요");
    }
  }, [persistAll, showToast]);
  const exportText = useCallback(() => {
    const lines = [];
    const groups = [...FIXED, ...projects];
    for (const p of groups) {
      const es = entries.filter(e => e.projectId === p.id);
      if (!es.length) continue;
      lines.push(`■ ${p.name}`);
      // 폴더별로 묶어서 출력 (미분류는 마지막)
      const catFolders = folders[p.id] || [];
      const groupsByFolder = [...catFolders, {
        id: NO_FOLDER,
        name: "미분류"
      }];
      for (const fo of groupsByFolder) {
        const fes = es.filter(e => (e.folderId || NO_FOLDER) === fo.id);
        if (!fes.length) continue;
        lines.push(`  ▶ ${fo.name}`);
        for (const e of fes) {
          lines.push(`    · [${e.date}] ${e.title}`);
          if (e.note) lines.push(`      ${e.note.replace(/\n/g, "\n      ")}`);
          if (e.company) lines.push(`      대상회사: ${e.company}`);
          if (e.companyOverview) lines.push(`      대상회사 개요: ${e.companyOverview}`);
          if (e.acquirer) lines.push(`      인수자: ${e.acquirer}`);
          if (e.dealSummary) lines.push(`      거래 요약: ${e.dealSummary}`);
          if (e.link) lines.push(`      기사 링크: ${e.link}`);
          if (e.task) lines.push(`      맡은 일: ${e.task}`);
          if (e.result) lines.push(`      결과: ${e.result}`);
          if (e.feedback) lines.push(`      피드백: ${e.feedback}`);
          if (e.learned) lines.push(`      느낀 점: ${e.learned}`);
          if (e.skills) lines.push(`      역량: ${e.skills}`);
          lines.push("");
        }
      }
      lines.push("");
    }
    download(lines.join("\n"), "text/plain", "txt");
    showToast("자소서용 텍스트 완료");
  }, [projects, entries, folders, showToast]);
  const css = `

  }

  }

    ReactDOM.createRoot(rootEl).render(React.createElement(InternLog));
  } catch (err) {
    window.__bootError((err && err.message ? err.message : String(err)) + "\n\n" + (err && err.stack ? err.stack.split("\n").slice(0,4).join("\n") : ""));
    if (window.console) console.error(err);
  }
})();
</script>
</body>
